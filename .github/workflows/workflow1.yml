name: Website workflow
on: 
  workflow_dispatch:
  push:
    branches: main
  pull_request:
    branches: main
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
            node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Deploy
        run: echo Deploying
